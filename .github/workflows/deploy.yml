name: Deploy to GitHub Pages

on:
  # Build & deploy on every push to the main branch
  push:
    branches: [main]
  # Allow running it manually from the Actions tab
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only let one deploy run at a time; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Persist background-removed images between builds so CMS-uploaded photos
      # aren't re-processed on every deploy (only new/changed photos are).
      - name: Cache processed images
        uses: actions/cache@v4
        with:
          path: public/images/processed
          key: processed-images-${{ hashFiles('public/images/uploads/**') }}
          restore-keys: |
            processed-images-

      - name: Build (static export)
        env:
          # Serves the site under https://<user>.github.io/<repo>/ — set
          # automatically from the repository name. If you later use a custom
          # domain or a <user>.github.io repo, set this to an empty string.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # FormSubmit id (email or alias) — add it under
          # Settings → Secrets and variables → Actions → New repository secret
          # (name: FORMSUBMIT_ID). Forms won't send email until this is set.
          NEXT_PUBLIC_FORMSUBMIT_ID: ${{ secrets.FORMSUBMIT_ID }}
          # Optional analytics — set repo secret PLAUSIBLE_DOMAIN to switch on.
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.PLAUSIBLE_DOMAIN }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
