<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Knife photo coming soon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#393f4a"/>
      <stop offset="1" stop-color="#23272e"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#aeb5c0"/>
      <stop offset="0.5" stop-color="#eaecef"/>
      <stop offset="1" stop-color="#828d9d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <g transform="translate(400 300) rotate(-20)">
    <!-- blade -->
    <path d="M -260 -8 L 70 -22 Q 120 -22 120 0 L 120 8 L -260 12 Z" fill="url(#steel)"/>
    <!-- bolster -->
    <rect x="120" y="-14" width="22" height="34" rx="4" fill="#b45309"/>
    <!-- handle -->
    <path d="M 142 -16 L 250 -10 Q 268 -8 268 6 Q 268 18 250 20 L 142 22 Z" fill="#642c16"/>
    <path d="M 142 -16 L 250 -10 Q 268 -8 268 6 Q 268 18 250 20 L 142 22 Z" fill="none" stroke="#793316" stroke-width="2"/>
  </g>
  <text x="400" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#aeb5c0">Photo coming soon</text>
</svg>
